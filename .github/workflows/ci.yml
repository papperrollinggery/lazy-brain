name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm 8+ optional dep bug may miss @rollup/rollup-darwin-arm64 on arm64 runners
          # Re-install the optional dep to ensure rollup can load
          npm install @rollup/rollup-darwin-arm64@4.60.2 --no-save 2>/dev/null || true
          npm install @rollup/rollup-darwin-x64@4.60.2 --no-save 2>/dev/null || true

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run lint
